<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SyncFlow v3 for Google</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── RESET & VARIABLES ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f9fb; --surface:#fff; --surface-2:#f1f3f5; --surface-3:#e9ecef;
  --text:#1a1d23; --text-2:#4a5060; --text-3:#8890a0;
  --blue:#1a73e8; --blue-light:#e8f0fe; --green:#0f9d58; --green-light:#e6f4ea;
  --red:#d93025; --red-light:#fce8e6; --yellow:#f9ab00; --yellow-light:#fef7e0;
  --purple:#7c3aed; --purple-light:#ede9fe;
  --border:#dee2e8; --radius:12px; --radius-sm:8px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow-lg:0 10px 25px rgba(0,0,0,.1),0 4px 10px rgba(0,0,0,.06);
}
body{
  font-family:'DM Sans',system-ui,sans-serif;
  background:var(--bg); color:var(--text);
  min-height:100vh; line-height:1.6;
}

/* ── LAYOUT ── */
.app-container{max-width:520px;margin:0 auto;padding:16px 16px 100px}

/* ── HEADER ── */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 0;margin-bottom:20px;
}
.header-left{display:flex;align-items:center;gap:10px}
.header-icon{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,var(--blue),var(--purple));
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:16px;font-weight:700;
}
.header-title{font-size:18px;font-weight:700;letter-spacing:-.3px}
.header-title span{color:var(--text-3);font-weight:400;font-size:13px;margin-left:4px}
.connection-badge{
  display:flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;
  background:var(--red-light);color:var(--red);transition:all .3s;
}
.connection-badge.connected{background:var(--green-light);color:var(--green)}
.connection-badge::before{
  content:'';width:6px;height:6px;border-radius:50%;
  background:currentColor;
}

/* ── CARDS ── */
.card{
  background:var(--surface);border-radius:var(--radius);
  padding:20px;margin-bottom:14px;
  border:1px solid var(--border);
  box-shadow:var(--shadow);
}
.card-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;
}
.card-title{font-size:13px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:.6px}
.card-count{
  background:var(--blue-light);color:var(--blue);
  padding:2px 10px;border-radius:20px;font-size:12px;font-weight:700;
}

/* ── STATS ROW ── */
.stats-row{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;
}
.stat-item{
  background:var(--surface-2);border-radius:var(--radius-sm);
  padding:12px;text-align:center;
}
.stat-value{font-size:22px;font-weight:700;color:var(--blue);line-height:1}
.stat-label{font-size:10px;color:var(--text-3);margin-top:4px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}

/* ── MEMBERS ── */
.member-list{display:flex;flex-direction:column;gap:6px}
.member-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 12px;border-radius:var(--radius-sm);
  background:var(--surface-2);font-size:13px;
  transition:background .2s;
}
.member-item:hover{background:var(--surface-3)}
.member-avatar{
  width:28px;height:28px;border-radius:50%;
  background:linear-gradient(135deg,var(--blue),var(--purple));
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:11px;font-weight:700;flex-shrink:0;
}
.member-email{color:var(--text);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── DURATION SELECTOR ── */
.duration-selector{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.dur-btn{
  padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);
  background:var(--surface);font-size:12px;font-weight:600;
  color:var(--text-2);cursor:pointer;transition:all .2s;
  font-family:inherit;
}
.dur-btn:hover{border-color:var(--blue);color:var(--blue)}
.dur-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}

/* ── SEARCH BUTTON ── */
.search-btn{
  width:100%;padding:14px;border:none;border-radius:var(--radius);
  background:linear-gradient(135deg,var(--blue),var(--purple));
  color:#fff;font-size:15px;font-weight:700;cursor:pointer;
  font-family:inherit;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.search-btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-lg)}
.search-btn:active{transform:translateY(0)}
.search-btn.loading{opacity:.7;pointer-events:none}
.search-btn.loading .btn-icon{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── SLOT RESULTS ── */
.slot-list{display:flex;flex-direction:column;gap:8px}
.slot-item{
  display:flex;align-items:center;gap:12px;
  padding:14px;border-radius:var(--radius-sm);
  border:1.5px solid var(--border);background:var(--surface);
  transition:all .2s;cursor:pointer;
}
.slot-item:hover{border-color:var(--blue);background:var(--blue-light)}
.slot-day{
  text-align:center;min-width:44px;
}
.slot-day-name{font-size:10px;color:var(--text-3);font-weight:600;text-transform:uppercase}
.slot-day-num{font-size:20px;font-weight:700;color:var(--text);line-height:1.1}
.slot-day-mon{font-size:10px;color:var(--text-3)}
.slot-info{flex:1}
.slot-time{font-size:14px;font-weight:700;color:var(--text)}
.slot-meta{font-size:11px;color:var(--text-3);margin-top:2px}
.slot-score{
  font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;
}
.slot-score.high{background:var(--green-light);color:var(--green)}
.slot-score.mid{background:var(--yellow-light);color:var(--yellow)}
.slot-score.low{background:var(--red-light);color:var(--red)}

/* ── SUGGEST INPUT ── */
.suggest-section{margin-top:14px}
.suggest-input-row{display:flex;gap:8px;margin-bottom:10px}
.suggest-input{
  flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);
  font-size:13px;font-family:inherit;background:var(--surface);color:var(--text);
  outline:none;transition:border-color .2s;
}
.suggest-input:focus{border-color:var(--blue)}
.suggest-btn{
  padding:10px 16px;border:none;border-radius:var(--radius-sm);
  background:var(--purple);color:#fff;font-size:13px;font-weight:600;
  cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .2s;
}
.suggest-btn:hover{opacity:.9}

/* ── TOAST ── */
.toast-container{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);
  z-index:9999;display:flex;flex-direction:column;gap:8px;
  pointer-events:none;
}
.toast{
  padding:10px 18px;border-radius:var(--radius-sm);
  font-size:13px;font-weight:500;pointer-events:auto;
  animation:toastIn .3s ease;box-shadow:var(--shadow-lg);
  max-width:360px;text-align:center;
}
.toast.success{background:var(--green);color:#fff}
.toast.error{background:var(--red);color:#fff}
.toast.info{background:var(--text);color:#fff}
@keyframes toastIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

/* ── SETTINGS SECTION ── */
.settings-toggle{
  display:flex;align-items:center;gap:8px;
  padding:10px 14px;border-radius:var(--radius-sm);
  background:var(--surface-2);font-size:12px;color:var(--text-2);
  cursor:pointer;border:none;font-family:inherit;font-weight:500;
  width:100%;text-align:left;transition:background .2s;
}
.settings-toggle:hover{background:var(--surface-3)}
.settings-panel{
  display:none;margin-top:10px;padding:14px;
  background:var(--surface-2);border-radius:var(--radius-sm);
}
.settings-panel.open{display:block}
.settings-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.settings-row label{font-size:12px;color:var(--text-2);font-weight:500;min-width:70px}
.settings-row input{
  flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:6px;
  font-size:12px;font-family:'DM Mono',monospace;background:var(--surface);
  color:var(--text);outline:none;
}
.settings-row input:focus{border-color:var(--blue)}
.save-url-btn{
  margin-top:8px;padding:8px 16px;border:none;border-radius:6px;
  background:var(--blue);color:#fff;font-size:12px;font-weight:600;
  cursor:pointer;font-family:inherit;
}

/* ── FOOTER ── */
.footer-note{
  font-size:11px;color:var(--text-3);text-align:center;
  margin-top:10px;line-height:1.5;
}

/* ── EMPTY STATE ── */
.empty-state{
  text-align:center;padding:30px 20px;color:var(--text-3);
}
.empty-state-icon{font-size:36px;margin-bottom:8px}
.empty-state-text{font-size:13px}

/* ── RESPONSIVE ── */
@media(max-width:400px){
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .duration-selector{gap:4px}
  .dur-btn{padding:5px 10px;font-size:11px}
}
</style>
</head>
<body>

<div class="app-container">
  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div class="header-icon">S</div>
      <span class="header-title">SyncFlow <span>v3</span></span>
    </div>
    <div class="connection-badge" id="connBadge">未接続</div>
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-item">
      <div class="stat-value" id="memberCount">0</div>
      <div class="stat-label">メンバー</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="slotCount">0</div>
      <div class="stat-label">空き枠</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="lastSync">--</div>
      <div class="stat-label">最終同期</div>
    </div>
  </div>

  <!-- MEMBERS CARD -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">メンバー</span>
      <button class="save-url-btn" id="refreshMembersBtn" style="margin:0;padding:4px 12px;font-size:11px">🔄 更新</button>
    </div>
    <div class="member-list" id="memberList">
      <div class="empty-state">
        <div class="empty-state-icon">👥</div>
        <div class="empty-state-text">GAS URLを設定してメンバーを読み込み</div>
      </div>
    </div>
  </div>

  <!-- SEARCH CARD -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">空き時間を検索</span>
    </div>

    <!-- Duration Selector -->
    <div class="duration-selector" id="durationSelector">
      <button class="dur-btn" data-dur="30">30分</button>
      <button class="dur-btn active" data-dur="60">1時間</button>
      <button class="dur-btn" data-dur="90">1.5時間</button>
      <button class="dur-btn" data-dur="120">2時間</button>
    </div>

    <!-- Search Button -->
    <button class="search-btn" id="searchBtn" onclick="searchSlots()">
      <span class="btn-icon">🔍</span>
      <span id="searchBtnText">空き時間を検索</span>
    </button>

    <!-- Slot Results -->
    <div style="margin-top:14px">
      <div class="slot-list" id="slotList">
        <div class="empty-state">
          <div class="empty-state-icon">📅</div>
          <div class="empty-state-text">検索ボタンを押して空き枠を探す</div>
        </div>
      </div>
    </div>
  </div>

  <!-- SUGGEST CARD -->
  <div class="card suggest-section">
    <div class="card-header">
      <span class="card-title">サジェスト機能</span>
    </div>
    <div class="suggest-input-row">
      <input class="suggest-input" id="suggestInput" placeholder="例: 来週の月曜午後に会議を入れたい" />
      <button class="suggest-btn" id="suggestBtn" onclick="suggestSlots()">提案</button>
    </div>
    <div id="suggestResult"></div>
  </div>

  <!-- SETTINGS -->
  <div class="card">
    <button class="settings-toggle" onclick="toggleSettings()">⚙️ GAS URL設定</button>
    <div class="settings-panel" id="settingsPanel">
      <div class="settings-row">
        <label>GAS URL</label>
        <input type="text" id="gasUrlInput" placeholder="https://script.google.com/macros/s/..." />
      </div>
      <button class="save-url-btn" onclick="saveGasUrl()">保存して接続</button>
      <div class="footer-note">※ GAS v3 WebアプリのURLを入力してください。Calendar Advanced Serviceを有効にすると、同一Workspaceのメンバーを自動取得できます。</div>
    </div>
  </div>
</div>

<!-- TOAST CONTAINER -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ─── STATE ─────────────────────────────────────────────────
let gasUrl = localStorage.getItem('syncflow_gas_url') || 'https://script.google.com/macros/s/AKfycbz6ybss582Me2d8QBh3KwpAG0zq7m0346YUTP3tk5vuYXMi_u8NgU6DpXvhMykW-X6ADQlbwb7yI96Q/exec';
let members = [];
let slots = [];
let selectedDuration = 60;

// ─── INIT ──────────────────────────────────────────────────
(function init() {
  document.getElementById('gasUrlInput').value = gasUrl;
  if (gasUrl) {
    updateConnectionBadge(true);
    fetchMembers();
  }

  // Duration selector
  document.querySelectorAll('.dur-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.dur-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedDuration = parseInt(btn.dataset.dur);
    });
  });

  document.getElementById('refreshMembersBtn').addEventListener('click', fetchMembers);

  // Suggest enter key
  document.getElementById('suggestInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') suggestSlots();
  });
})();

// ─── GAS URL MANAGEMENT ───────────────────────────────────
function saveGasUrl() {
  const url = document.getElementById('gasUrlInput').value.trim();
  if (!url) { showToast('URLを入力してください', 'error'); return; }
  gasUrl = url;
  localStorage.setItem('syncflow_gas_url', gasUrl);
  updateConnectionBadge(true);
  showToast('✅ GAS URL を保存しました', 'success');
  fetchMembers();
}

function toggleSettings() {
  document.getElementById('settingsPanel').classList.toggle('open');
}

function updateConnectionBadge(connected) {
  const badge = document.getElementById('connBadge');
  if (connected) {
    badge.textContent = '接続中';
    badge.classList.add('connected');
  } else {
    badge.textContent = '未接続';
    badge.classList.remove('connected');
  }
}

// ─── FETCH MEMBERS ────────────────────────────────────────
async function fetchMembers() {
  if (!gasUrl) {
    showToast('先にGAS URLを保存してください', 'error');
    return;
  }
  const btn = document.getElementById('refreshMembersBtn');
  btn.disabled = true;
  btn.innerHTML = '⏳ 読轼中…';

  try {
    const params = new URLSearchParams({ action: 'members' });
    const res = await fetch(gasUrl + '?' + params.toString());
    const data = await res.json();

    if (data.status === 'success') {
      members = data.members || [];
      renderMembers(members);
      document.getElementById('memberCount').textContent = members.length;
      setLastSync();
      updateConnectionBadge(true);
      showToast(`${members.length}名のメンバーを取得しました`, 'success');
    } else {
      throw new Error(data.message || 'GASエラー');
    }
  } catch(e) {
    members = ['tanaka@example.com','sato@example.com','suzuki@example.com'];
    renderMembers(members);
    document.getElementById('memberCount').textContent = members.length;
    setLastSync();
    showToast('⚠️ デモデータを表示中 (GAS未接続)', 'info');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '🔄 更新';
  }
}

function renderMembers(list) {
  const el = document.getElementById('memberList');
  if (!list.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">👥</div><div class="empty-state-text">メンバーが見つかりません</div></div>';
    return;
  }
  el.innerHTML = list.map(email => {
    const initials = email.split('@')[0].slice(0,2).toUpperCase();
    return `<div class="member-item"><div class="member-avatar">${initials}</div><span class="member-email">${email}</span></div>`;
  }).join('');
}

// ─── SEARCH SLOTS ─────────────────────────────────────────
async function searchSlots() {
  const btn = document.getElementById('searchBtn');
  btn.classList.add('loading');
  btn.disabled = true;
  document.getElementById('searchBtnText').textContent = '検索中…';

  if (!gasUrl) {
    showToast('⚠️ GAS未接続 — デモデータを表示中', 'info');
    demoSearch();
    btn.classList.remove('loading');
    btn.disabled = false;
    document.getElementById('searchBtnText').textContent = '空き時間を検索';
    return;
  }

  try {
    const params = new URLSearchParams({
      action: 'slots',
      duration: selectedDuration,
      emails: members.join(',')
    });
    const res = await fetch(gasUrl + '?' + params.toString());
    const data = await res.json();

    const searched = data.searched ? `（${data.searched}名対象）` : '';
    if (data.status === 'success') {
      slots = (data.slots || []).slice(0, 3);

      if (data.members && data.members.length) {
        members = data.members;
        renderMembers(members);
        document.getElementById('memberCount').textContent = members.length;
      }

      document.getElementById('slotCount').textContent = slots.length;
      setLastSync();
      updateConnectionBadge(true);

      if (slots.length === 0) {
        showToast(`空き時間が見つかりませんでした ${searched}`, 'info');
      } else {
        showToast(`✅ ${slots.length}件の空き枠が見つかりました ${searched}`, 'success');
      }

      renderSlots(slots);
    } else {
      throw new Error(data.message || 'GASエラー');
    }
  } catch(e) {
    showToast('⚠️ GAS未接続 — デモデータを表示中', 'info');
    demoSearch();
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
    document.getElementById('searchBtnText').textContent = '空き時間を検索';
  }
}

// ─── DEMO SEARCH ──────────────────────────────────────────
function demoSearch() {
  const base = new Date();
  base.setDate(base.getDate() + 1);
  base.setHours(10, 0, 0, 0);
  const d = selectedDuration;

  slots = [
    buildDemoSlot(base, 0, 10, 0, d),
    buildDemoSlot(base, 1, 14, 0, d),
    buildDemoSlot(base, 3, 9, 30, d),
  ];

  document.getElementById('slotCount').textContent = slots.length;
  setLastSync();
  renderSlots(slots);
}

function buildDemoSlot(base, dayOffset, hour, min, durMin) {
  const start = new Date(base);
  start.setDate(start.getDate() + dayOffset);
  start.setHours(hour, min, 0, 0);
  const end = new Date(start.getTime() + durMin * 60000);
  return {
    start: start.toISOString(),
    end: end.toISOString(),
    score: Math.floor(Math.random() * 40) + 60
  };
}

function renderSlots(list) {
  const el = document.getElementById('slotList');
  if (!list.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📅</div><div class="empty-state-text">空き枠が見つかりませんでした</div></div>';
    return;
  }
  const days = ['日','月','火','水','木','金','土'];
  const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

  el.innerHTML = list.map(s => {
    const st = new Date(s.start);
    const en = new Date(s.end);
    const score = s.score || Math.floor(Math.random() * 40) + 60;
    const scoreClass = score >= 80 ? 'high' : score >= 60 ? 'mid' : 'low';
    const durMin = Math.round((en - st) / 60000);
    return `
      <div class="slot-item" onclick="copySlot(this, '${st.toISOString()}')">
        <div class="slot-day">
          <div class="slot-day-name">${days[st.getDay()]}</div>
          <div class="slot-day-num">${st.getDate()}</div>
          <div class="slot-day-mon">${months[st.getMonth()]}</div>
        </div>
        <div class="slot-info">
          <div class="slot-time">${fmt(st)} 〜 ${fmt(en)}</div>
          <div class="slot-meta">${durMin}分間 ・ ${members.length}名全員OK</div>
        </div>
        <div class="slot-score ${scoreClass}">${score}%</div>
      </div>
    `;
  }).join('');
}

function fmt(d) {
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function copySlot(el, iso) {
  const d = new Date(iso);
  const text = `${d.getMonth()+1}/${d.getDate()} ${fmt(d)}〜`;
  navigator.clipboard.writeText(text).then(() => {
    showToast(`📋 コピーしました: ${text}`, 'success');
  }).catch(() => {});
}

// ─── SUGGEST ──────────────────────────────────────────────
async function suggestSlots() {
  const input = document.getElementById('suggestInput').value.trim();
  if (!input) { showToast('テキストを入力してください', 'error'); return; }

  const resultEl = document.getElementById('suggestResult');
  resultEl.innerHTML = '<div style="text-align:center;color:var(--text-3);font-size:13px;padding:10px">🔄 分析中…</div>';

  if (!gasUrl) {
    resultEl.innerHTML = '<div style="padding:10px;font-size:13px;color:var(--text-2)">GAS未接続のため、デモ結果を表示します:<br>→ 来週月曜 14:00-15:00 がおすすめです（全員空き）</div>';
    return;
  }

  try {
    const params = new URLSearchParams({ action: 'suggest', query: input, duration: selectedDuration });
    const res = await fetch(gasUrl + '?' + params.toString());
    const data = await res.json();
    if (data.status === 'success' && data.suggestion) {
      resultEl.innerHTML = `<div style="padding:10px;font-size:13px;color:var(--text);background:var(--purple-light);border-radius:var(--radius-sm)">${data.suggestion}</div>`;
    } else {
      resultEl.innerHTML = `<div style="padding:10px;font-size:13px;color:var(--text-2)">${data.message || '結果がありません'}</div>`;
    }
  } catch(e) {
    resultEl.innerHTML = '<div style="padding:10px;font-size:13px;color:var(--text-2)">⚠️ 接続エラー。GAS URLを確認してください。</div>';
  }
}

// ─── HELPERS ──────────────────────────────────────────────
function setLastSync() {
  const now = new Date();
  document.getElementById('lastSync').textContent = fmt(now);
}

function showToast(message, type = 'info') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity .3s'; }, 2500);
  setTimeout(() => toast.remove(), 3000);
}
</script>
