<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SyncFlow v5</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f9fb;--surface:#fff;--surface-2:#f1f3f5;--surface-3:#e9ecef;
  --text:#1a1d23;--text-2:#4a5060;--text-3:#8890a0;
  --blue:#1a73e8;--blue-light:#e8f0fe;
  --green:#34a853;--green-light:#e6f4ea;
  --red:#ea4335;--red-light:#fce8e6;
  --orange:#fbbc04;--orange-light:#fef7e0;
  --radius:12px;--shadow:0 1px 3px rgba(0,0,0,.08);
  --font:'DM Sans','Segoe UI','Hiragino Kaku Gothic ProN',sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;padding:20px}
.container{max-width:720px;margin:0 auto}
h1{font-size:1.5rem;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.subtitle{color:var(--text-3);font-size:.85rem;margin-bottom:24px}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:.7rem;font-weight:600;padding:2px 8px;border-radius:20px}
.badge-ok{background:var(--green-light);color:var(--green)}
.badge-err{background:var(--red-light);color:var(--red)}
.badge-loading{background:var(--orange-light);color:#b88a00}

/* カード */
.card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:16px;overflow:visible;position:relative}
.card-title{font-size:.95rem;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px}

/* フォーム */
label{display:block;font-size:.8rem;font-weight:600;color:var(--text-2);margin-bottom:4px}
.input-row{display:flex;gap:8px;margin-bottom:12px;align-items:flex-end}
.input-group{flex:1;position:relative}
input,select{width:100%;padding:8px 12px;border:1.5px solid var(--surface-3);border-radius:8px;font-size:.9rem;font-family:var(--font);transition:border-color .2s}
input:focus,select:focus{outline:none;border-color:var(--blue)}

/* サジェストドロップダウン */
.suggest-list{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1.5px solid var(--surface-3);border-radius:8px;max-height:200px;overflow-y:auto;z-index:100;display:none;box-shadow:0 4px 12px rgba(0,0,0,.12)}
.suggest-list.show{display:block}
.suggest-item{padding:8px 12px;cursor:pointer;font-size:.85rem;transition:background .15s}
.suggest-item:hover{background:var(--blue-light)}

/* タグ */
.tag-container{display:flex;flex-wrap:wrap;gap:6px;min-height:32px;margin-bottom:12px}
.tag{display:inline-flex;align-items:center;gap:4px;background:var(--blue-light);color:var(--blue);padding:4px 10px;border-radius:20px;font-size:.8rem;font-weight:500}
.tag-organizer{background:var(--green-light);color:var(--green)}
.tag .remove{cursor:pointer;font-weight:700;opacity:.6;transition:opacity .15s}
.tag .remove:hover{opacity:1}

/* ボタン */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border:none;border-radius:8px;font-size:.9rem;font-weight:600;font-family:var(--font);cursor:pointer;transition:all .2s}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:#1557b0}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{background:#2d8e47}
.btn-red{background:var(--red);color:#fff;font-size:.8rem;padding:6px 12px}
.btn-red:hover{background:#c5221f}
.btn-outline{background:transparent;border:1.5px solid var(--surface-3);color:var(--text-2)}
.btn-outline:hover{border-color:var(--blue);color:var(--blue)}
.btn-sm{padding:6px 12px;font-size:.8rem}

/* スロット */
.slot-list{display:flex;flex-direction:column;gap:8px}
.slot-item{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--surface-2);border-radius:8px;transition:background .15s}
.slot-item:hover{background:var(--blue-light)}
.slot-date{font-weight:600;font-size:.9rem}
.slot-time{color:var(--text-2);font-size:.85rem}
.slot-actions{display:flex;gap:6px}

/* 作成済みイベント */
.created-event{background:var(--green-light);border-radius:8px;padding:12px 16px;margin-top:8px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.created-event a{color:var(--green);font-weight:600;text-decoration:none}
.created-event a:hover{text-decoration:underline}

/* ステータス */
.status-bar{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.empty{text-align:center;padding:24px;color:var(--text-3);font-size:.9rem}
.error-box{display:none;background:var(--red-light);color:var(--red);padding:12px;border-radius:8px;margin-top:8px;font-size:.85rem}

/* トースト */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:#fff;padding:10px 24px;border-radius:8px;font-size:.85rem;font-weight:500;opacity:0;transition:all .3s ease;z-index:1000;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{background:var(--green)}
.toast.error{background:var(--red)}

/* モーダル */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);z-index:500;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border-radius:var(--radius);padding:24px;width:90%;max-width:420px;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal h3{font-size:1.1rem;margin-bottom:16px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}

/* レスポンシブ */
@media(max-width:600px){
  .input-row{flex-direction:column}
  .slot-item{flex-direction:column;align-items:flex-start;gap:8px}
  .slot-actions{width:100%;justify-content:flex-end}
}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
  <div class="status-bar">
    <h1>📅 SyncFlow v5</h1>
    <span class="badge badge-loading" id="connBadge">接続中...</span>
  </div>
  <p class="subtitle">グループカレンダー空き時間検索 & ミーティング作成</p>

  <!-- 主催者セクション -->
  <div class="card">
    <div class="card-title">👤 主催者</div>
    <div class="input-group">
      <input type="text" id="organizerInput" placeholder="主催者名またはメールで検索..." autocomplete="off">
      <div class="suggest-list" id="organizerSuggest"></div>
    </div>
    <div class="tag-container" id="organizerTag"></div>
  </div>

  <!-- 参加者セクション -->
  <div class="card">
    <div class="card-title">👥 参加者</div>
    <div class="input-group">
      <input type="text" id="attendeeInput" placeholder="参加者名またはメールで検索..." autocomplete="off">
      <div class="suggest-list" id="attendeeSuggest"></div>
    </div>
    <div class="tag-container" id="attendeeTags"></div>
  </div>

  <!-- 検索条件 -->
  <div class="card">
    <div class="card-title">⏱ 検索条件</div>
    <div class="input-row">
      <div class="input-group">
        <label>ミーティング時間</label>
        <select id="duration">
          <option value="15">15分</option>
          <option value="30" selected>30分</option>
          <option value="45">45分</option>
          <option value="60">60分</option>
          <option value="90">90分</option>
          <option value="120">120分</option>
        </select>
      </div>
      <div class="input-group" style="flex:0 0 auto">
        <label>&nbsp;</label>
        <button class="btn btn-primary" id="searchBtn" onclick="searchSlots()" disabled>🔍 空き枠を探す</button>
      </div>
    </div>
    <div class="error-box" id="searchError"></div>
  </div>

  <!-- 検索結果 -->
  <div class="card" id="resultsCard" style="display:none">
    <div class="card-title">📋 検索結果 <span id="resultCount" style="font-weight:400;color:var(--text-3);font-size:.8rem"></span></div>
    <div class="slot-list" id="slotList"></div>
  </div>

  <!-- 作成済みミーティング -->
  <div class="card" id="createdCard" style="display:none">
    <div class="card-title">✅ 作成済みミーティング</div>
    <div id="createdList"></div>
  </div>
</div>

<!-- ミーティング作成モーダル -->
<div class="modal-overlay" id="createModal">
  <div class="modal">
    <h3>📹 ミーティング作成</h3>
    <div class="input-group" style="margin-bottom:12px">
      <label>タイトル</label>
      <input type="text" id="meetingTitle" value="ミーティング">
    </div>
    <div class="input-group" style="margin-bottom:12px">
      <label>説明（任意）</label>
      <input type="text" id="meetingDesc" placeholder="">
    </div>
    <div id="modalSlotInfo" style="font-size:.85rem;color:var(--text-2);margin-bottom:12px"></div>
    <div id="modalParticipants" style="font-size:.85rem;color:var(--text-2);margin-bottom:12px"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-green" id="confirmCreateBtn" onclick="confirmCreate()">作成する</button>
    </div>
  </div>
</div>

<!-- 削除確認モーダル -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <h3>🗑 ミーティング削除</h3>
    <p id="deleteModalText" style="font-size:.9rem;margin-bottom:8px"></p>
    <p style="font-size:.8rem;color:var(--text-3)">参加者全員に削除通知が送信されます。</p>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeDeleteModal()">キャンセル</button>
      <button class="btn btn-red" id="confirmDeleteBtn" onclick="confirmDelete()">削除する</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ━━━ GAS API URL（デプロイ後に自動設定 or 手動設定）━━━
const GAS_URL = getGasUrl();
function getGasUrl() {
  // GASから配信されている場合はlocation.hrefから取得
  const href = location.href;
  if (href.includes('script.google.com')) {
    return href.split('?')[0];
  }
  // Vercelなどの外部ホスティングの場合は手動設定
  return 'https://script.google.com/macros/s/AKfycbxe0XCvP_HBLgP1KuffHLGlxC1pqoFhsoWEY28S5gSn8BnhcpiyHvcZNBxBvZGRoUSSrg/exec';
}

let allMembers = [];
let selectedOrganizer = null;
let selectedAttendees = [];
let pendingSlot = null;
let pendingDeleteEvent = null;
let createdEvents = []; // 作成済みミーティングの追跡

// ━━━ 初期化 ━━━
document.addEventListener('DOMContentLoaded', init);

async function init() {
  try {
    const res = await fetch(GAS_URL + '?action=members');
    const data = await res.json();
    if (data.status === 'success') {
      allMembers = data.members;
      document.getElementById('connBadge').textContent = '接続中 (' + data.count + '名)';
      document.getElementById('connBadge').className = 'badge badge-ok';
    } else {
      throw new Error(data.message || '接続失敗');
    }
  } catch (e) {
    document.getElementById('connBadge').textContent = '未接続';
    document.getElementById('connBadge').className = 'badge badge-err';
  }
  setupSuggest('organizerInput', 'organizerSuggest', selectOrganizer);
  setupSuggest('attendeeInput', 'attendeeSuggest', selectAttendee);
  updateSearchButton();
}

// ━━━ サジェスト機能 ━━━
function setupSuggest(inputId, suggestId, onSelect) {
  const input = document.getElementById(inputId);
  const suggest = document.getElementById(suggestId);

  input.addEventListener('input', () => {
    const q = input.value.toLowerCase().trim();
    if (!q) { suggest.classList.remove('show'); return; }
    const filtered = allMembers.filter(m =>
      (m.name.toLowerCase().includes(q) || m.email.toLowerCase().includes(q)) &&
      !(selectedOrganizer && m.email === selectedOrganizer.email) &&
      !selectedAttendees.some(a => a.email === m.email)
    );
    if (filtered.length === 0) { suggest.classList.remove('show'); return; }
    suggest.innerHTML = filtered.map(m =>
      '<div class="suggest-item" data-email="' + m.email + '">' +
      '<strong>' + m.name + '</strong> <span style="color:var(--text-3);font-size:.8rem">' + m.email + '</span></div>'
    ).join('');
    suggest.classList.add('show');
    suggest.querySelectorAll('.suggest-item').forEach(item => {
      item.addEventListener('click', () => {
        const member = allMembers.find(m => m.email === item.dataset.email);
        if (member) onSelect(member);
        input.value = '';
        suggest.classList.remove('show');
      });
    });
  });

  input.addEventListener('focus', () => {
    if (input.value.trim()) input.dispatchEvent(new Event('input'));
  });
}

// ━━━ 主催者選択 ━━━
function selectOrganizer(member) {
  selectedOrganizer = member;
  const container = document.getElementById('organizerTag');
  container.innerHTML =
    '<span class="tag tag-organizer">' + member.name +
    ' <span class="remove" onclick="removeOrganizer()">×</span></span>';
  updateSearchButton();
}

function removeOrganizer() {
  selectedOrganizer = null;
  document.getElementById('organizerTag').innerHTML = '';
  updateSearchButton();
}

// ━━━ 参加者選択 ━━━
function selectAttendee(member) {
  if (selectedAttendees.some(a => a.email === member.email)) return;
  selectedAttendees.push(member);
  renderAttendeeTags();
  updateSearchButton();
}

function removeAttendee(email) {
  selectedAttendees = selectedAttendees.filter(a => a.email !== email);
  renderAttendeeTags();
  updateSearchButton();
}

function renderAttendeeTags() {
  const container = document.getElementById('attendeeTags');
  container.innerHTML = selectedAttendees.map(m =>
    '<span class="tag">' + m.name +
    ' <span class="remove" onclick="removeAttendee(\'' + m.email + '\')">×</span></span>'
  ).join('');
}

function updateSearchButton() {
  const btn = document.getElementById('searchBtn');
  const hasOrganizer = !!selectedOrganizer;
  const hasAttendees = selectedAttendees.length > 0;
  btn.disabled = !(hasOrganizer || hasAttendees);
}

// ━━━ 空き枠検索 ━━━
async function searchSlots() {
  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  btn.textContent = '🔄 検索中...';
  hideError('searchError');

  const duration = document.getElementById('duration').value;
  const organizer = selectedOrganizer ? selectedOrganizer.email : '';
  const attendees = selectedAttendees.map(a => a.email).join(',');

  try {
    const url = GAS_URL + '?action=slots&organizer=' + encodeURIComponent(organizer) +
      '&attendees=' + encodeURIComponent(attendees) + '&duration=' + duration;
    const res = await fetch(url);
    const data = await res.json();

    if (data.status !== 'success') throw new Error(data.message);

    renderSlots(data.slots);
    document.getElementById('resultsCard').style.display = '';
    document.getElementById('resultCount').textContent =
      data.searched + '名の予定を確認 → ' + data.slots.length + '件の空き枠';
  } catch (e) {
    showError('searchError', e);
  }

  btn.disabled = false;
  btn.textContent = '🔍 空き枠を探す';
}

// ━━━ スロット描画 ━━━
function renderSlots(slots) {
  const list = document.getElementById('slotList');
  if (slots.length === 0) {
    list.innerHTML = '<div class="empty">空き枠が見つかりませんでした</div>';
    return;
  }
  list.innerHTML = slots.map((s, i) => {
    const start = new Date(s.start);
    const end = new Date(s.end);
    const dateStr = (start.getMonth() + 1) + '/' + start.getDate() + '(' + ['日','月','火','水','木','金','土'][start.getDay()] + ')';
    const timeStr = pad(start.getHours()) + ':' + pad(start.getMinutes()) + ' - ' + pad(end.getHours()) + ':' + pad(end.getMinutes());
    return '<div class="slot-item" id="slot-' + i + '">' +
      '<div><span class="slot-date">' + dateStr + '</span> <span class="slot-time">' + timeStr + '</span></div>' +
      '<div class="slot-actions">' +
        '<button class="btn btn-green btn-sm" onclick="openCreateModal(' + i + ',\'' + s.start + '\',\'' + s.end + '\')">📹 ミーティング作成</button>' +
      '</div></div>';
  }).join('');
}

function pad(n) { return String(n).padStart(2, '0'); }

// ━━━ ミーティング作成モーダル ━━━
function openCreateModal(slotIdx, start, end) {
  pendingSlot = { idx: slotIdx, start: start, end: end };
  const s = new Date(start);
  const e = new Date(end);
  const dateStr = (s.getMonth() + 1) + '/' + s.getDate() + '(' + ['日','月','火','水','木','金','土'][s.getDay()] + ')';
  const timeStr = pad(s.getHours()) + ':' + pad(s.getMinutes()) + ' - ' + pad(e.getHours()) + ':' + pad(e.getMinutes());
  document.getElementById('modalSlotInfo').textContent = '📅 ' + dateStr + ' ' + timeStr;

  // 参加者情報を表示
  const parts = [];
  if (selectedOrganizer) parts.push('主催: ' + selectedOrganizer.name);
  if (selectedAttendees.length > 0) parts.push('参加者: ' + selectedAttendees.map(a => a.name).join(', '));
  document.getElementById('modalParticipants').textContent = parts.join(' | ');

  document.getElementById('createModal').classList.add('show');
}

function closeModal() {
  document.getElementById('createModal').classList.remove('show');
  pendingSlot = null;
}

async function confirmCreate() {
  if (!pendingSlot) return;
  const btn = document.getElementById('confirmCreateBtn');
  btn.disabled = true;
  btn.textContent = '作成中...';

  const title = document.getElementById('meetingTitle').value || 'ミーティング';
  const desc  = document.getElementById('meetingDesc').value || '';
  const guests = selectedAttendees.map(a => a.email);
  const organizer = selectedOrganizer ? selectedOrganizer.email : '';

  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        action: 'create',
        start: pendingSlot.start,
        end: pendingSlot.end,
        title: title,
        description: desc,
        organizer: organizer,
        guests: guests,
      }),
    });
    const data = await res.json();
    if (data.status !== 'success') throw new Error(data.message);

    // 作成成功 → スロットを作成済みに変更
    const slotEl = document.getElementById('slot-' + pendingSlot.idx);
    if (slotEl) {
      slotEl.innerHTML =
        '<div><span class="slot-date">✅ ' + title + '</span></div>' +
        '<div class="slot-actions">' +
          (data.meetLink ? '<a href="' + data.meetLink + '" target="_blank" class="btn btn-green btn-sm">📹 Meet</a>' : '') +
          '<a href="' + data.htmlLink + '" target="_blank" class="btn btn-outline btn-sm">📅 カレンダー</a>' +
          '<button class="btn btn-red btn-sm" onclick="openDeleteModal(\'' + data.eventId + '\',\'' + title + '\',\'' + organizer + '\')">🗑</button>' +
        '</div>';
      slotEl.style.background = 'var(--green-light)';
    }

    // 作成済みリストに追加
    createdEvents.push({
      eventId: data.eventId,
      title: title,
      organizer: organizer,
      meetLink: data.meetLink,
      htmlLink: data.htmlLink,
    });
    renderCreatedEvents();

    showToast(data.message, 'success');
    closeModal();
  } catch (e) {
    showToast('エラー: ' + e.message, 'error');
  }

  btn.disabled = false;
  btn.textContent = '作成する';
}

// ━━━ 作成済みミーティング一覧 ━━━
function renderCreatedEvents() {
  const card = document.getElementById('createdCard');
  const list = document.getElementById('createdList');
  if (createdEvents.length === 0) { card.style.display = 'none'; return; }
  card.style.display = '';
  list.innerHTML = createdEvents.map(ev =>
    '<div class="created-event" id="event-' + ev.eventId + '">' +
      '<div>' +
        '<strong>' + ev.title + '</strong>' +
        (ev.meetLink ? ' <a href="' + ev.meetLink + '" target="_blank">📹 Meet</a>' : '') +
        ' <a href="' + ev.htmlLink + '" target="_blank">📅 カレンダー</a>' +
      '</div>' +
      '<button class="btn btn-red btn-sm" onclick="openDeleteModal(\'' + ev.eventId + '\',\'' + ev.title + '\',\'' + ev.organizer + '\')">🗑 削除</button>' +
    '</div>'
  ).join('');
}

// ━━━ 削除モーダル ━━━
function openDeleteModal(eventId, title, calendarId) {
  pendingDeleteEvent = { eventId: eventId, calendarId: calendarId };
  document.getElementById('deleteModalText').textContent = '「' + title + '」を削除しますか？';
  document.getElementById('deleteModal').classList.add('show');
}

function closeDeleteModal() {
  document.getElementById('deleteModal').classList.remove('show');
  pendingDeleteEvent = null;
}

async function confirmDelete() {
  if (!pendingDeleteEvent) return;
  const btn = document.getElementById('confirmDeleteBtn');
  btn.disabled = true;
  btn.textContent = '削除中...';

  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        action: 'delete',
        eventId: pendingDeleteEvent.eventId,
        calendarId: pendingDeleteEvent.calendarId,
      }),
    });
    const data = await res.json();
    if (data.status !== 'success') throw new Error(data.message);

    // UIから削除
    const el = document.getElementById('event-' + pendingDeleteEvent.eventId);
    if (el) el.remove();
    createdEvents = createdEvents.filter(e => e.eventId !== pendingDeleteEvent.eventId);
    if (createdEvents.length === 0) document.getElementById('createdCard').style.display = 'none';

    showToast('ミーティングを削除しました', 'success');
    closeDeleteModal();
  } catch (e) {
    showToast('削除エラー: ' + e.message, 'error');
  }

  btn.disabled = false;
  btn.textContent = '削除する';
}

// ━━━ ユーティリティ ━━━
function showToast(message, type) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.className = 'toast ' + (type || '') + ' show';
  setTimeout(() => toast.classList.remove('show'), 3000);
}

function showError(elementId, error) {
  const el = document.getElementById(elementId);
  el.style.display = 'block';
  el.innerHTML = '<strong>エラー:</strong> ' + (error.message || error);
}

function hideError(elementId) {
  document.getElementById(elementId).style.display = 'none';
}

// ドロップダウン外クリックで閉じる
document.addEventListener('click', (e) => {
  if (!e.target.closest('#organizerInput') && !e.target.closest('#organizerSuggest')) {
    document.getElementById('organizerSuggest').classList.remove('show');
  }
  if (!e.target.closest('#attendeeInput') && !e.target.closest('#attendeeSuggest')) {
    document.getElementById('attendeeSuggest').classList.remove('show');
  }
});
</script>
